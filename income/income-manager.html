<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Income Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --red: #D85A30;
    --red-dark: #993C1D;
    --red-light: #FAECE7;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --bg: #F5F4EF;
    --surface: #FFFFFF;
    --surface2: #F0EEE8;
    --border: rgba(0,0,0,0.09);
    --text: #1A1A18;
    --text2: #6B6B67;
    --text3: #9B9B97;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }
  .app { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* Header */
  .app-header { margin-bottom: 1.5rem; }
  .app-header h1 { font-family: 'DM Serif Display', serif; font-size: 28px; font-weight: 400; color: var(--text); letter-spacing: -0.3px; }
  .app-header p { font-size: 13px; color: var(--text2); margin-top: 3px; }

  /* Nav tabs */
  .nav { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--surface2); padding: 4px; border-radius: var(--radius-sm); }
  .nav-btn { flex: 1; padding: 8px 6px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; background: none; border: none; border-radius: 6px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .nav-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .stat-value.inc { color: var(--green-dark); }
  .stat-value.exp { color: var(--red-dark); }
  .stat-value.bal { color: var(--text); }

  /* Panel */
  .panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .panel-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .panel-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .panel-body { padding: 1.25rem; }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .field input, .field select {
    height: 38px; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text); font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    padding: 0 10px; outline: none; transition: border 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--green); background: var(--surface); }
  .type-toggle { display: flex; gap: 6px; }
  .type-btn { flex: 1; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .type-btn.active-inc { background: var(--green-light); color: var(--green-dark); border-color: var(--green); }
  .type-btn.active-exp { background: var(--red-light); color: var(--red-dark); border-color: var(--red); }
  .btn { height: 38px; padding: 0 18px; border-radius: var(--radius-sm); border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); background: #E8E6E0; }
  .btn-sm { height: 32px; padding: 0 12px; font-size: 12px; }
  .form-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: var(--text); color: white; border-color: var(--text); }
  select.filter-select { height: 30px; border-radius: 20px; border: 1px solid var(--border); background: none; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text2); padding: 0 10px; cursor: pointer; outline: none; }

  /* Entries */
  .entries-list { display: flex; flex-direction: column; }
  .entry { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .entry:last-child { border-bottom: none; }
  .entry-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 17px; }
  .entry-icon.inc { background: var(--green-light); color: var(--green-dark); }
  .entry-icon.exp { background: var(--red-light); color: var(--red-dark); }
  .entry-info { flex: 1; min-width: 0; }
  .entry-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .entry-right { text-align: right; flex-shrink: 0; }
  .entry-amount { font-size: 14px; font-weight: 600; }
  .entry-amount.inc { color: var(--green-dark); }
  .entry-amount.exp { color: var(--red-dark); }
  .entry-date { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 4px 6px; border-radius: 6px; transition: color 0.15s; flex-shrink: 0; }
  .del-btn:hover { color: var(--red); }
  .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.4; }

  /* Monthly view */
  .month-group { margin-bottom: 1rem; }
  .month-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
  .month-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
  .month-badge.pos { background: var(--green-light); color: var(--green-dark); }
  .month-badge.neg { background: var(--red-light); color: var(--red-dark); }

  /* Budget view */
  .budget-grid { display: flex; flex-direction: column; gap: 10px; }
  .budget-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .budget-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .budget-cat { font-size: 13px; font-weight: 500; }
  .budget-nums { font-size: 12px; color: var(--text2); }
  .budget-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .budget-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .budget-fill.ok { background: var(--green); }
  .budget-fill.warn { background: var(--amber); }
  .budget-fill.over { background: var(--red); }
  .budget-set { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .budget-set input { height: 30px; width: 100px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); padding: 0 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; }
  .budget-set input:focus { border-color: var(--green); }

  /* Chart */
  .chart-section { margin-top: 1.5rem; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { font-size: 12px; color: var(--text2); width: 80px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .bar-fill.inc { background: var(--green); }
  .bar-fill.exp { background: var(--red); }
  .bar-val { font-size: 12px; color: var(--text2); width: 70px; text-align: right; flex-shrink: 0; }

  /* Toast */
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: white; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Mobile */
  @media (max-width: 480px) {
    .app { padding: 1rem 0.75rem 4rem; }
    .app-header h1 { font-size: 22px; }
    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat:last-child { grid-column: 1 / -1; }
    .stat-value { font-size: 17px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.triple { grid-template-columns: 1fr 1fr; }
    .nav-btn { font-size: 12px; padding: 7px 4px; }
    .panel-header { gap: 6px; }
    .filter-bar { gap: 4px; }
    .filter-btn { padding: 4px 10px; font-size: 11px; }
    .entry-icon { width: 32px; height: 32px; font-size: 14px; }
    .budget-set input { width: 80px; }
  }
  @media (max-width: 360px) {
    .stats { grid-template-columns: 1fr; }
    .stats .stat:last-child { grid-column: auto; }
    .form-grid.triple { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>Income Manager</h1>
    <p id="date-range">Track income, expenses and budgets</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Income</div><div class="stat-value inc" id="s-inc">$0.00</div></div>
    <div class="stat"><div class="stat-label">Expenses</div><div class="stat-value exp" id="s-exp">$0.00</div></div>
    <div class="stat"><div class="stat-label">Balance</div><div class="stat-value bal" id="s-bal">$0.00</div></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('entries',this)">📋 Entries</button>
    <button class="nav-btn" onclick="showTab('monthly',this)">📅 Monthly</button>
    <button class="nav-btn" onclick="showTab('budget',this)">🎯 Budget</button>
    <button class="nav-btn" onclick="showTab('charts',this)">📊 Charts</button>
  </div>

  <!-- ENTRIES TAB -->
  <div id="tab-entries">
    <div class="panel" style="margin-bottom:1rem">
      <div class="panel-header"><div class="panel-title">Add Entry</div></div>
      <div class="panel-body">
        <div style="margin-bottom:10px">
          <div class="field" style="margin-bottom:8px"><label>Type</label></div>
          <div class="type-toggle">
            <button class="type-btn active-inc" id="type-inc" onclick="setType('income')">▲ Income</button>
            <button class="type-btn" id="type-exp" onclick="setType('expense')">▼ Expense</button>
          </div>
        </div>
        <div class="form-grid">
          <div class="field form-full">
            <label>Description</label>
            <input type="text" id="f-desc" placeholder="e.g. Salary, Groceries…" />
          </div>
          <div class="field">
            <label>Amount ($)</label>
            <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" />
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="f-date" />
          </div>
          <div class="field">
            <label>Category</label>
            <select id="f-cat">
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="Investment">Investment</option>
              <option value="Business">Business</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Housing">Housing</option>
              <option value="Health">Health</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Shopping">Shopping</option>
              <option value="Education">Education</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label>Note (optional)</label>
            <input type="text" id="f-note" placeholder="Any extra detail…" />
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="addEntry()">+ Add Entry</button>
          <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()" style="margin-left:auto">⬇ Export CSV</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">All Entries</div>
        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('income',this)">Income</button>
          <button class="filter-btn" onclick="setFilter('expense',this)">Expenses</button>
          <select class="filter-select" id="filter-cat" onchange="renderEntries()">
            <option value="">All categories</option>
          </select>
        </div>
      </div>
      <div class="panel-body" style="padding-top:4px;padding-bottom:4px">
        <div class="entries-list" id="entries-list"></div>
      </div>
    </div>
  </div>

  <!-- MONTHLY TAB -->
  <div id="tab-monthly" style="display:none">
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Monthly Overview</div></div>
      <div class="panel-body" id="monthly-body"></div>
    </div>
  </div>

  <!-- BUDGET TAB -->
  <div id="tab-budget" style="display:none">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Monthly Budget Limits</div>
        <div style="font-size:12px;color:var(--text3)">Current month expenses</div>
      </div>
      <div class="panel-body">
        <div class="budget-grid" id="budget-grid"></div>
      </div>
    </div>
  </div>

  <!-- CHARTS TAB -->
  <div id="tab-charts" style="display:none">
    <div class="panel" style="margin-bottom:1rem">
      <div class="panel-header"><div class="panel-title">Income by category</div></div>
      <div class="panel-body" id="chart-inc"></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Expenses by category</div></div>
      <div class="panel-body" id="chart-exp"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let entries = JSON.parse(localStorage.getItem('im_entries2') || '[]');
let budgets = JSON.parse(localStorage.getItem('im_budgets') || '{}');
let entryType = 'income';
let entryFilter = 'all';
let activeTab = 'entries';

const CATS = ['Salary','Freelance','Investment','Business','Food','Transport','Housing','Health','Entertainment','Shopping','Education','Other'];
const INCOME_CATS = ['Salary','Freelance','Investment','Business'];

function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function monthKey(dateStr) { return dateStr.slice(0,7); }
function monthLabel(key) { const [y,m] = key.split('-'); return new Date(y,m-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }

function save() {
  localStorage.setItem('im_entries2', JSON.stringify(entries));
  localStorage.setItem('im_budgets', JSON.stringify(budgets));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setType(t) {
  entryType = t;
  document.getElementById('type-inc').className = 'type-btn' + (t==='income' ? ' active-inc' : '');
  document.getElementById('type-exp').className = 'type-btn' + (t==='expense' ? ' active-exp' : '');
  const cat = document.getElementById('f-cat');
  cat.innerHTML = (t === 'income' ? INCOME_CATS : CATS.filter(c => !INCOME_CATS.includes(c))).map(c=>`<option value="${c}">${c}</option>`).join('');
}

function setFilter(f, el) {
  entryFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderEntries();
}

function addEntry() {
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value || todayStr();
  const cat = document.getElementById('f-cat').value;
  const note = document.getElementById('f-note').value.trim();
  if (!desc) { document.getElementById('f-desc').focus(); toast('Please enter a description'); return; }
  if (isNaN(amount) || amount <= 0) { document.getElementById('f-amount').focus(); toast('Please enter a valid amount'); return; }
  entries.unshift({ id: Date.now(), desc, amount, type: entryType, cat, note, date });
  save(); clearForm(); renderAll(); toast('Entry added ✓');
}

function clearForm() {
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-date').value = todayStr();
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save(); renderAll(); toast('Deleted');
}

function showTab(tab, el) {
  activeTab = tab;
  ['entries','monthly','budget','charts'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function renderStats() {
  const inc = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const exp = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const bal = inc - exp;
  document.getElementById('s-inc').textContent = fmt(inc);
  document.getElementById('s-exp').textContent = fmt(exp);
  const bEl = document.getElementById('s-bal');
  bEl.textContent = (bal<0?'-':'')+fmt(bal);
  bEl.style.color = bal<0 ? 'var(--red-dark)' : bal>0 ? 'var(--green-dark)' : 'var(--text)';
}

function renderEntries() {
  const catFilter = document.getElementById('filter-cat').value;
  let cats = [...new Set(entries.map(e=>e.cat))].sort();
  const sel = document.getElementById('filter-cat');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All categories</option>' + cats.map(c=>`<option value="${c}"${c===prev?' selected':''}>${c}</option>`).join('');

  let visible = entries;
  if (entryFilter !== 'all') visible = visible.filter(e => e.type === entryFilter);
  if (catFilter) visible = visible.filter(e => e.cat === catFilter);

  const list = document.getElementById('entries-list');
  if (!visible.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>No entries found</div></div>';
    return;
  }
  list.innerHTML = visible.map(e => `
    <div class="entry">
      <div class="entry-icon ${e.type==='income'?'inc':'exp'}">${e.type==='income'?'↙':'↗'}</div>
      <div class="entry-info">
        <div class="entry-name">${e.desc}</div>
        <div class="entry-meta">${e.cat}${e.note?' · '+e.note:''}</div>
      </div>
      <div class="entry-right">
        <div class="entry-amount ${e.type==='income'?'inc':'exp'}">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div>
        <div class="entry-date">${fmtDate(e.date)}</div>
      </div>
      <button class="del-btn" onclick="deleteEntry(${e.id})" aria-label="Delete">🗑</button>
    </div>
  `).join('');
}

function renderMonthly() {
  const grouped = {};
  entries.forEach(e => {
    const mk = monthKey(e.date);
    if (!grouped[mk]) grouped[mk] = [];
    grouped[mk].push(e);
  });
  const keys = Object.keys(grouped).sort().reverse();
  const body = document.getElementById('monthly-body');
  if (!keys.length) { body.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div>No entries yet</div></div>'; return; }
  body.innerHTML = keys.map(mk => {
    const items = grouped[mk];
    const inc = items.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const exp = items.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    const bal = inc - exp;
    return `<div class="month-group">
      <div class="month-label">
        <span>${monthLabel(mk)}</span>
        <span class="month-badge ${bal>=0?'pos':'neg'}">${bal>=0?'+':'-'}${fmt(bal)}</span>
      </div>
      <div style="display:flex;gap:16px;padding:8px 0 4px;font-size:12px;color:var(--text2)">
        <span style="color:var(--green-dark)">▲ ${fmt(inc)}</span>
        <span style="color:var(--red-dark)">▼ ${fmt(exp)}</span>
        <span>${items.length} entries</span>
      </div>
      ${items.map(e => `
        <div class="entry">
          <div class="entry-icon ${e.type==='income'?'inc':'exp'}" style="width:30px;height:30px;font-size:13px">${e.type==='income'?'↙':'↗'}</div>
          <div class="entry-info">
            <div class="entry-name" style="font-size:13px">${e.desc}</div>
            <div class="entry-meta">${e.cat} · ${fmtDate(e.date)}</div>
          </div>
          <div class="entry-amount ${e.type==='income'?'inc':'exp'}" style="font-size:13px">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

function renderBudget() {
  const now = todayStr().slice(0,7);
  const expCats = [...new Set(entries.filter(e=>e.type==='expense').map(e=>e.cat))].sort();
  if (!expCats.length) {
    document.getElementById('budget-grid').innerHTML = '<div style="color:var(--text3);font-size:14px;text-align:center;padding:1rem">Add expense entries to set budgets</div>';
    return;
  }
  const grid = document.getElementById('budget-grid');
  grid.innerHTML = expCats.map(cat => {
    const spent = entries.filter(e=>e.type==='expense'&&e.cat===cat&&e.date.slice(0,7)===now).reduce((s,e)=>s+e.amount,0);
    const limit = budgets[cat] || 0;
    const pct = limit > 0 ? Math.min((spent/limit)*100, 100) : 0;
    const cls = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : 'ok';
    return `<div class="budget-item">
      <div class="budget-row">
        <div class="budget-cat">${cat}</div>
        <div class="budget-nums">${fmt(spent)} ${limit>0?'/ '+fmt(limit):''}</div>
      </div>
      ${limit > 0 ? `<div class="budget-track"><div class="budget-fill ${cls}" style="width:${pct.toFixed(1)}%"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">${pct>=100?'⚠ Over budget':pct>=80?'⚡ Near limit':'✓ On track'} — ${pct.toFixed(0)}% used</div>` : ''}
      <div class="budget-set">
        <input type="number" id="b-${cat}" placeholder="Set limit…" value="${limit||''}" min="0" step="1" />
        <button class="btn btn-ghost btn-sm" onclick="setBudget('${cat}')">Save</button>
        ${limit > 0 ? `<button class="btn btn-ghost btn-sm" onclick="clearBudget('${cat}')">Clear</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setBudget(cat) {
  const val = parseFloat(document.getElementById('b-'+cat).value);
  if (isNaN(val) || val <= 0) { toast('Enter a valid limit'); return; }
  budgets[cat] = val; save(); renderBudget(); toast('Budget saved ✓');
}
function clearBudget(cat) { delete budgets[cat]; save(); renderBudget(); toast('Budget cleared'); }

function renderCharts() {
  function buildBars(type, containerId) {
    const catTotals = {};
    entries.filter(e=>e.type===type).forEach(e => { catTotals[e.cat] = (catTotals[e.cat]||0) + e.amount; });
    const pairs = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    const el = document.getElementById(containerId);
    if (!pairs.length) { el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:4px 0">No data yet</div>'; return; }
    const max = pairs[0][1];
    el.innerHTML = pairs.map(([cat,val]) => `
      <div class="bar-row">
        <div class="bar-label">${cat}</div>
        <div class="bar-track"><div class="bar-fill ${type==='income'?'inc':'exp'}" style="width:${Math.round(val/max*100)}%"></div></div>
        <div class="bar-val">${fmt(val)}</div>
      </div>
    `).join('');
  }
  buildBars('income', 'chart-inc');
  buildBars('expense', 'chart-exp');
}

function exportCSV() {
  if (!entries.length) { toast('No entries to export'); return; }
  const rows = [['Date','Description','Category','Type','Amount','Note']];
  entries.forEach(e => rows.push([e.date, `"${e.desc}"`, e.cat, e.type, e.amount.toFixed(2), `"${e.note||''}"`]));
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='income-manager.csv'; a.click();
  URL.revokeObjectURL(url); toast('CSV exported ✓');
}

function renderAll() {
  renderStats();
  if (activeTab === 'entries') renderEntries();
  if (activeTab === 'monthly') renderMonthly();
  if (activeTab === 'budget') renderBudget();
  if (activeTab === 'charts') renderCharts();
}

// Init
document.getElementById('f-date').value = todayStr();
setType('income');
renderAll();
</script>
</body>
</html>
